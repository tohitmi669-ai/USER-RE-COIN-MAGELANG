<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RE-COIN | Tukar Botol Jadi Belanja</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        :root {
            --primary: #00b894;
            --secondary: #00cec9;
            --dark: #2d3436;
            --gold: #fdcb6e;
            --danger: #ff7675;
        }
        
        body {
            background: linear-gradient(135deg, #00b894 0%, #0984e3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        
        .card {
            background: white;
            padding: 24px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 400px;
        }
        
        .card-full {
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 16px;
            border-radius: 60px;
            overflow: hidden;
            background: #f1f2f6;
        }
        
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        h2 {
            font-weight: 800;
            margin: 0;
            font-size: 28px;
            color: var(--dark);
            text-align: center;
        }
        
        .subtitle {
            color: #636e72;
            font-size: 14px;
            margin-bottom: 24px;
            display: block;
            text-align: center;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        
        input:focus, textarea:focus {
            border-color: var(--primary);
        }
        
        .btn-main, .btn-tarik, .btn-belanja {
            padding: 16px;
            font-size: 16px;
            border-radius: 16px;
            font-weight: 700;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }
        
        .btn-main {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-tarik {
            background: linear-gradient(to right, #fdcb6e, #f39c12);
            color: var(--dark);
        }
        
        .btn-belanja {
            background: linear-gradient(to right, #6c5ce7, #a363d9);
            color: white;
        }
        
        .btn-main:active, .btn-tarik:active, .btn-belanja:active {
            transform: scale(0.98);
        }
        
        .btn-main:disabled, .btn-tarik:disabled {
            background: #dfe6e9;
            cursor: not-allowed;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 16px;
        }
        
        .stat-label {
            font-size: 12px;
            font-weight: 700;
            color: #b2bec3;
            text-transform: uppercase;
        }
        
        .val-botol {
            font-size: 48px;
            font-weight: 800;
            color: var(--primary);
            margin: 4px 0;
            line-height: 1;
        }
        
        .val-rupiah {
            font-size: 32px;
            font-weight: 800;
            color: var(--dark);
            margin: 4px 0;
        }
        
        .machine-info {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
        }
        
        .machine-id {
            font-weight: 700;
            color: var(--dark);
            font-size: 16px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 16px 24px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            font-weight: 600;
            z-index: 9999;
            animation: slideDown 0.3s ease;
            border: 2px solid var(--primary);
        }
        
        .notification.warning {
            border-color: #fdcb6e;
            background: #fff3cd;
        }
        
        .notification.error {
            border-color: #ff7675;
            background: #ffe8e8;
        }
        
        @keyframes slideDown {
            from { transform: translate(-50%, -100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        
        .hidden {
            display: none !important;
        }
        
        .user-badge {
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .btn-logout {
            background: none;
            border: none;
            color: #b2bec3;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: underline;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        
        .product-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 12px;
        }
        
        .product-card img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        
        .product-name {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .product-price {
            font-weight: 800;
            font-size: 14px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .btn-beli {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 12px;
            width: 100%;
            cursor: pointer;
        }
        
        .btn-beli:disabled {
            background: #dfe6e9;
            cursor: not-allowed;
        }
        
        .cart-icon {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        
        .cart-panel {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 16px;
            margin: 16px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #dfe6e9;
        }
        
        .cart-total {
            font-weight: 800;
            font-size: 18px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px solid #dfe6e9;
        }
        
        .btn-checkout {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: 700;
            width: 100%;
            margin-top: 16px;
            cursor: pointer;
        }
        
        .btn-checkout:disabled {
            background: #dfe6e9;
            cursor: not-allowed;
        }
        
        .btn-back {
            background: none;
            border: none;
            color: #b2bec3;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            color: #b2bec3;
        }
        
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal {
            background: white;
            padding: 24px;
            border-radius: 32px 32px 0 0;
            width: 100%;
            max-width: 500px;
        }
        
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .warning-text {
            color: var(--danger);
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
        }
        
        .alamat-panel {
            margin: 16px 0;
            animation: slideDown 0.3s ease;
        }
        
        .alamat-panel textarea:focus {
            border-color: var(--primary);
            outline: none;
        }
        
        .koordinat-box {
            margin-top: 10px;
            padding: 8px;
            background: #e8f8f5;
            border-radius: 8px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .koordinat-box a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .btn-lokasi {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-lokasi:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.4);
        }
        
        .btn-lokasi:active {
            transform: translateY(0);
        }
        
        .btn-lokasi:disabled {
            background: #b2bec3;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div id="notification"></div>

    <!-- LOGIN PAGE -->
    <div id="login-page" class="card">
        <div class="logo-container">
            <img src="https://blogger.googleusercontent.com/img/a/AVvXsEjgjxOIVDPz5ZSArOCO_gzGumxmP87KZYIpCHU6R7M6qwMJA_XIiArURexEySHx4r9xZwj60feen8IB3PCcIZ7ydrnJUfkPXoJ4lvKHw_ZtiKtAyiBoUQXaFRYHV6mcf_7l9oS_PywQUvNMYzfv5F8MQ9yDUACJIrw-TLwktfOOEkHPIJ96OW3eiCORrCy8">
        </div>
        
        <h2 id="auth-title">RE-COIN</h2>
        <span id="auth-subtitle" class="subtitle">Scan QR Mesin untuk Mulai</span>
        
        <input type="number" id="phone-input" placeholder="Nomor HP">
        <input type="password" id="pass-input" class="hidden" placeholder="Password">
        
        <button id="btn-auth" class="btn-main" onclick="handleAuth()">LANJUTKAN</button>
        
        <div id="machine-info-login" class="machine-info hidden">
            <span>Mesin Terdeteksi: <span id="machine-id-display" class="machine-id">-</span></span>
        </div>
    </div>

    <!-- DASHBOARD PAGE -->
    <div id="dashboard-page" class="card hidden">
        <div class="user-badge" id="user-display"></div>
        
        <div class="machine-info">
            <span>Mesin Anda: <span id="active-machine" class="machine-id">-</span></span>
        </div>
        
        <div class="stat-card">
            <div class="stat-label">TOTAL BOTOL</div>
            <div class="val-botol" id="count">0</div>
        </div>
        
        <div class="stat-card">
            <div class="stat-label">SALDO</div>
            <div class="val-rupiah" id="rupiah">Rp 0</div>
        </div>
        
        <button id="btn-tarik" class="btn-tarik" onclick="openWithdrawalModal()" disabled>
            💰 TARIK SALDO
        </button>
        
        <button id="btn-belanja" class="btn-belanja" onclick="showShop()">
            🛒 BELANJA
        </button>
        
        <div id="msg-limit" class="warning-text">
            Minimal saldo Rp 5.000 untuk tarik
        </div>
        
        <button class="btn-logout" onclick="logout()">LOGOUT</button>
    </div>

    <!-- SHOP PAGE -->
    <div id="shop-page" class="card card-full hidden">
        <button class="btn-back" onclick="hideShop()">← Kembali</button>
        
        <div class="cart-header">
            <h3>🛍️ Produk</h3>
            <div class="cart-icon" onclick="toggleCart()">
                🛒 <span class="cart-count" id="cart-count">0</span>
            </div>
        </div>
        
        <div id="cart-panel" class="cart-panel hidden">
            <h4>Keranjang</h4>
            <div id="cart-items"></div>
            <div class="cart-total" id="cart-total">Total: Rp 0</div>
            
            <!-- ALAMAT PENGIRIMAN -->
            <div class="alamat-panel">
                <h4 style="margin:12px 0 8px 0; display: flex; align-items: center; gap: 5px;">
                    📍 Alamat Pengiriman
                    <span style="font-size: 11px; color: var(--danger);">(wajib)</span>
                </h4>
                
                <textarea id="alamat-pengiriman" rows="3" 
                          placeholder="Contoh: Jl. Merdeka No. 123, RT 01/RW 02, Kelurahan Sukajadi, Kecamatan Sukasari, Kota Magelang, Jawa Tengah 56123"></textarea>
                
                <div style="display: flex; align-items: center; gap: 10px; margin: 8px 0;">
                    <input type="checkbox" id="simpan-alamat" style="width: auto;">
                    <label for="simpan-alamat" style="font-size: 13px;">Simpan alamat untuk下次 belanja</label>
                </div>
                
                <div style="display: flex; align-items: center; gap: 5px; margin-top: 5px;">
                    <span style="font-size: 13px; color: #666;">📍 Atau kirim lokasi:</span>
                    <button class="btn-lokasi" onclick="getLocation()">
                        <span style="display: flex; align-items: center; gap: 5px;">
                            <span style="font-size: 16px;">📍</span>
                            <span>Ambil Lokasi Saya</span>
                        </span>
                    </button>
                </div>
                
                <div id="koordinat-display" style="display: none;" class="koordinat-box">
                    <span id="koordinat-text"></span>
                    <button onclick="clearLocation()" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                </div>
            </div>
            
            <button class="btn-checkout" onclick="checkout()" id="btn-checkout" disabled>
                CHECKOUT & KIRIM VIA WA
            </button>
        </div>
        
        <div class="product-grid" id="product-grid">
            <div class="loading">Memuat produk...</div>
        </div>
    </div>

    <!-- WITHDRAWAL MODAL -->
    <div id="modal-overlay">
        <div class="modal">
            <h3>Metode Penarikan</h3>
            <select id="payment-method" onchange="updatePaymentPlaceholder()">
                <option value="BANK">BANK</option>
                <option value="DANA">DANA</option>
                <option value="OVO">OVO</option>
            </select>
            <textarea id="payment-details" rows="3" placeholder="Detail rekening"></textarea>
            <button class="btn-main" onclick="processWithdrawal()">KONFIRMASI</button>
            <button onclick="closeModal()" style="background:none; border:none; width:100%; margin-top:10px;">Batal</button>
        </div>
    </div>

    <script>
        // ===========================================
        // FIREBASE CONFIGURATION
        // ===========================================
        const firebaseConfig = {
            databaseURL: "https://re-coin-magelang-2026-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // ===========================================
        // GLOBAL VARIABLES
        // ===========================================
        let currentUser = {
            phone: "",
            botol: 0,
            machine: ""
        };
        
        let isRegistering = false;
        const HARGA_PER_BOTOL = 50;
        const ADMIN_WA = "6289524538835";
        
        let cart = [];
        let products = [];
        
        // Lokasi pengiriman
        let currentLocation = {
            lat: null,
            lng: null,
            alamat: ""
        };
        
        // ===========================================
        // UTILITY FUNCTIONS
        // ===========================================
        function getMachineFromUrl() {
            return new URLSearchParams(window.location.search).get('mesin') || "";
        }
        
        function formatRupiah(angka) {
            return 'Rp ' + angka.toLocaleString('id-ID');
        }
        
        function showNotification(message, type = 'success') {
            const notif = document.createElement('div');
            notif.className = 'notification';
            if (type === 'warning') notif.classList.add('warning');
            if (type === 'error') notif.classList.add('error');
            notif.innerHTML = message;
            document.getElementById('notification').appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }
        
        // ===========================================
        // AUTHENTICATION
        // ===========================================
        function handleAuth() {
            const phone = document.getElementById('phone-input').value.replace(/\D/g, '');
            const password = document.getElementById('pass-input').value;
            const machineId = getMachineFromUrl();
            
            if (phone.length < 10) return showNotification('HP minimal 10 digit', 'error');
            if (!machineId) return showNotification('QR tidak valid!', 'error');
            
            currentUser.phone = phone;
            currentUser.machine = machineId;
            
            db.ref('/accounts/' + phone).once('value', (snap) => {
                if (snap.exists()) {
                    if (!password) {
                        showPasswordInput('LOGIN', 'Masukkan Password');
                        return;
                    }
                    if (snap.val().password === password) {
                        performLogin();
                    } else {
                        showNotification('Password salah!', 'error');
                    }
                } else {
                    if (!password) {
                        showPasswordInput('DAFTAR', 'Buat Password');
                        return;
                    }
                    if (password.length < 4) return showNotification('Password min 4 karakter', 'error');
                    
                    db.ref('/accounts/' + phone).set({
                        password: password,
                        botol: 0,
                        created_at: Date.now()
                    }).then(() => {
                        performLogin();
                    });
                }
            });
        }
        
        function showPasswordInput(title, subtitle) {
            document.getElementById('phone-input').readOnly = true;
            document.getElementById('pass-input').classList.remove('hidden');
            document.getElementById('auth-title').innerText = title;
            document.getElementById('auth-subtitle').innerText = subtitle;
            document.getElementById('btn-auth').onclick = handleAuth;
        }
        
        function performLogin() {
            // ✅ UPDATE USER DI MESIN
            db.ref('/' + currentUser.machine + '/active_user').set({
                id: currentUser.phone,
                login_time: Date.now()
            });
            
            db.ref('/accounts/' + currentUser.phone + '/active_machine').set(currentUser.machine);
            
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser.phone;
            document.getElementById('active-machine').innerText = currentUser.machine;
            
            setupListeners();
            loadProducts();
            
            showNotification('Selamat datang di RE-COIN!');
        }
        
        // ===========================================
        // FIREBASE LISTENERS
        // ===========================================
        function setupListeners() {
            db.ref('/accounts/' + currentUser.phone + '/botol').on('value', (snap) => {
                const botolBaru = snap.val() || 0;
                const sebelumnya = currentUser.botol;
                currentUser.botol = botolBaru;
                updateUI();
                
                if (botolBaru > sebelumnya) {
                    showNotification(`🎉 +${botolBaru - sebelumnya} BOTOL!`);
                }
            });
        }
        
        function logout() {
            if (currentUser.machine && currentUser.phone) {
                db.ref('/' + currentUser.machine + '/active_user').remove();
                db.ref('/accounts/' + currentUser.phone + '/active_machine').remove();
            }
            
            db.ref('/accounts/' + currentUser.phone + '/botol').off();
            
            location.reload();
        }
        
        // ===========================================
        // UI UPDATE
        // ===========================================
        function updateUI() {
            const saldo = currentUser.botol * HARGA_PER_BOTOL;
            document.getElementById('count').innerText = currentUser.botol;
            document.getElementById('rupiah').innerText = formatRupiah(saldo);
            
            const btnTarik = document.getElementById('btn-tarik');
            btnTarik.disabled = saldo < 5000;
        }
        
        // ===========================================
        // SHOP & PRODUCTS
        // ===========================================
        function loadProducts() {
            db.ref('/products').once('value', (snap) => {
                products = [];
                const data = snap.val() || {};
                for (let id in data) products.push({ id, ...data[id] });
                displayProducts();
            });
        }
        
        function displayProducts() {
            const grid = document.getElementById('product-grid');
            if (products.length === 0) {
                grid.innerHTML = '<div class="loading">Tidak ada produk</div>';
                return;
            }
            
            let html = '';
            products.forEach(p => {
                html += `
                    <div class="product-card">
                        <img src="${p.image || 'https://via.placeholder.com/200x200/00b894/ffffff?text=Produk'}" alt="${p.name}">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${formatRupiah(p.price || 0)}</div>
                        <button class="btn-beli" onclick="addToCart('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''}>
                            ${p.stock <= 0 ? 'Habis' : 'Beli'}
                        </button>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }
        
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const saldo = currentUser.botol * HARGA_PER_BOTOL;
            if (saldo < product.price) return showNotification('Saldo tidak cukup', 'error');
            
            const existing = cart.find(i => i.id === productId);
            existing ? existing.quantity++ : cart.push({ ...product, quantity: 1 });
            
            updateCartDisplay();
        }
        
        function removeFromCart(productId) {
            const index = cart.findIndex(i => i.id === productId);
            if (index === -1) return;
            
            if (cart[index].quantity > 1) cart[index].quantity--;
            else cart.splice(index, 1);
            
            updateCartDisplay();
        }
        
        function updateCartDisplay() {
            document.getElementById('cart-count').textContent = cart.reduce((s, i) => s + i.quantity, 0);
            
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('cart-total');
            const checkoutBtn = document.getElementById('btn-checkout');
            
            if (cart.length === 0) {
                itemsDiv.innerHTML = '<p style="color:#b2bec3;">Keranjang kosong</p>';
                totalSpan.innerHTML = 'Total: Rp 0';
                checkoutBtn.disabled = true;
                return;
            }
            
            let html = '';
            let total = 0;
            
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <div class="cart-item">
                        <div>${item.name} x${item.quantity}</div>
                        <div>
                            ${formatRupiah(itemTotal)}
                            <button onclick="removeFromCart('${item.id}')" style="border:none; background:none; color:var(--danger);">✕</button>
                        </div>
                    </div>
                `;
            });
            
            itemsDiv.innerHTML = html;
            totalSpan.innerHTML = `Total: ${formatRupiah(total)}`;
            
            const saldo = currentUser.botol * HARGA_PER_BOTOL;
            checkoutBtn.disabled = total > saldo;
        }
        
        // ===========================================
        // FITUR ALAMAT PENGIRIMAN
        // ===========================================
        function loadSavedAddress() {
            const saved = localStorage.getItem('recoin_alamat_' + currentUser.phone);
            if (saved) {
                document.getElementById('alamat-pengiriman').value = saved;
            }
        }
        
        function getLocation() {
            if (navigator.geolocation) {
                showNotification('Mendapatkan lokasi...', 'info');
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentLocation.lat = position.coords.latitude;
                        currentLocation.lng = position.coords.longitude;
                        
                        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLocation.lat}&lon=${currentLocation.lng}`)
                            .then(res => res.json())
                            .then(data => {
                                if (data.display_name) {
                                    document.getElementById('alamat-pengiriman').value = data.display_name;
                                    currentLocation.alamat = data.display_name;
                                }
                            })
                            .catch(err => console.log(err));
                        
                        const mapsLink = `https://www.google.com/maps?q=${currentLocation.lat},${currentLocation.lng}`;
                        document.getElementById('koordinat-display').style.display = 'flex';
                        document.getElementById('koordinat-text').innerHTML = 
                            `<a href="${mapsLink}" target="_blank">📍 Lihat di Google Maps</a>`;
                        
                        showNotification('Lokasi berhasil didapatkan!');
                    },
                    (error) => {
                        showNotification('Gagal mendapatkan lokasi', 'error');
                    }
                );
            } else {
                showNotification('Browser tidak mendukung GPS', 'error');
            }
        }
        
        function clearLocation() {
            currentLocation = { lat: null, lng: null, alamat: "" };
            document.getElementById('koordinat-display').style.display = 'none';
        }
        
        // ===========================================
        // CHECKOUT DENGAN WHATSAPP & ALAMAT
        // ===========================================
        function checkout() {
            const alamat = document.getElementById('alamat-pengiriman').value.trim();
            
            if (!alamat) {
                showNotification('Mohon isi alamat pengiriman!', 'error');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const saldo = currentUser.botol * HARGA_PER_BOTOL;
            const sisaSaldo = saldo - total;
            const botolDipakai = Math.ceil(total / HARGA_PER_BOTOL);
            const newBotol = currentUser.botol - botolDipakai;
            
            if (total > saldo) {
                showNotification('Saldo tidak cukup!', 'error');
                return;
            }
            
            if (document.getElementById('simpan-alamat').checked) {
                localStorage.setItem('recoin_alamat_' + currentUser.phone, alamat);
            }
            
            const now = new Date();
            const tanggal = now.toLocaleDateString('id-ID');
            const waktu = now.toLocaleTimeString('id-ID');
            
            let itemsList = '';
            cart.forEach(item => {
                itemsList += `• ${item.name} (${item.quantity}x) = ${formatRupiah(item.price * item.quantity)}\n`;
            });
            
            let mapsLink = '';
            if (currentLocation.lat && currentLocation.lng) {
                mapsLink = `https://www.google.com/maps?q=${currentLocation.lat},${currentLocation.lng}`;
            }
            
            const pesan = 
`*NOTA PEMBELIAN RE-COIN*
━━━━━━━━━━━━━━━━━━━━━
*ID User:* ${currentUser.phone}
*Mesin:* ${currentUser.machine}
*Tanggal:* ${tanggal}
*Waktu:* ${waktu}
━━━━━━━━━━━━━━━━━━━━━
*PRODUK YANG DIBELI:*
${itemsList}
━━━━━━━━━━━━━━━━━━━━━
*TOTAL BELANJA:* ${formatRupiah(total)}
*SISA SALDO:* ${formatRupiah(sisaSaldo)}
*BOTOL TERPAKAI:* ${botolDipakai} botol
━━━━━━━━━━━━━━━━━━━━━
📍 *ALAMAT PENGIRIMAN:*
${alamat}
${mapsLink ? `🗺️ *Lokasi GPS:* ${mapsLink}` : ''}
━━━━━━━━━━━━━━━━━━━━━
✅ Terima kasih telah berbelanja!
🌿 RE-COIN - Sampah Jadi Rupiah`;

            const updates = {};
            updates[`/accounts/${currentUser.phone}/botol`] = newBotol;
            
            cart.forEach(item => {
                updates[`/products/${item.id}/stock`] = firebase.database.ServerValue.increment(-item.quantity);
            });
            
            const transId = Date.now().toString();
            updates[`/transactions/${currentUser.phone}/${transId}`] = {
                type: 'PEMBELIAN',
                items: cart.map(i => ({
                    id: i.id,
                    name: i.name,
                    quantity: i.quantity,
                    price: i.price
                })),
                alamat: alamat,
                koordinat: currentLocation.lat && currentLocation.lng ? {
                    lat: currentLocation.lat,
                    lng: currentLocation.lng
                } : null,
                total: total,
                timestamp: Date.now(),
                mesin: currentUser.machine
            };
            
            db.ref().update(updates).then(() => {
                const waUrl = `https://wa.me/${ADMIN_WA}?text=${encodeURIComponent(pesan)}`;
                window.open(waUrl, '_blank');
                
                cart = [];
                updateCartDisplay();
                document.getElementById('cart-panel').classList.add('hidden');
                clearLocation();
                
                showNotification(`✅ Checkout berhasil! Total: ${formatRupiah(total)}`);
            });
        }
        
        // ===========================================
        // WITHDRAWAL
        // ===========================================
        function openWithdrawalModal() {
            document.getElementById('modal-overlay').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }
        
        function updatePaymentPlaceholder() {
            const method = document.getElementById('payment-method').value;
            const placeholder = method === 'BANK' 
                ? 'Nama Bank, No Rekening, Atas Nama'
                : `No HP ${method}, Atas Nama`;
            document.getElementById('payment-details').placeholder = placeholder;
        }
        
        function processWithdrawal() {
            const method = document.getElementById('payment-method').value;
            const details = document.getElementById('payment-details').value;
            
            if (!details) return showNotification('Isi detail!', 'error');
            
            const saldo = currentUser.botol * HARGA_PER_BOTOL;
            
            const transId = Date.now().toString();
            db.ref('/transactions/' + currentUser.phone + '/' + transId).set({
                type: 'PENARIKAN',
                method: method,
                details: details,
                amount: saldo,
                timestamp: Date.now(),
                mesin: currentUser.machine
            }).then(() => {
                db.ref('/accounts/' + currentUser.phone + '/botol').set(0).then(() => {
                    const pesan = `*PENARIKAN RE-COIN*\n` +
                                 `ID: ${currentUser.phone}\n` +
                                 `Mesin: ${currentUser.machine}\n` +
                                 `Jumlah: Rp ${saldo.toLocaleString()}\n` +
                                 `Metode: ${method}\n` +
                                 `Detail: ${details}`;
                    
                    window.open(`https://wa.me/${ADMIN_WA}?text=${encodeURIComponent(pesan)}`, '_blank');
                    closeModal();
                    showNotification('Penarikan diproses');
                });
            });
        }
        
        // ===========================================
        // NAVIGATION
        // ===========================================
        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('hidden');
        }
        
        function showShop() {
            document.getElementById('dashboard-page').classList.add('hidden');
            document.getElementById('shop-page').classList.remove('hidden');
            loadProducts();
            loadSavedAddress();
        }
        
        function hideShop() {
            document.getElementById('shop-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('hidden');
        }
        
        // ===========================================
        // AUTO CLEANUP
        // ===========================================
        window.addEventListener('beforeunload', function() {
            // Tidak melakukan apa-apa, biarkan user tetap login
        });
        
        // ===========================================
        // INITIALIZATION
        // ===========================================
        window.onload = function() {
            const machineId = getMachineFromUrl();
            if (machineId) {
                document.getElementById('machine-info-login').classList.remove('hidden');
                document.getElementById('machine-id-display').innerText = machineId;
            }
        };
    </script>
</body>
</html>
