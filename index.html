<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE-COIN | Digital Waste Solution</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00b894;
            --secondary: #00cec9;
            --dark: #2d3436;
            --gold: #fdcb6e;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #00b894 0%, #0984e3 100%);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.4);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            background: white;
            width: 80px;
            height: 80px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 45px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h2 { font-weight: 800; margin: 0; letter-spacing: -1px; font-size: 30px; color: var(--dark); }
        .subtitle { color: #636e72; font-size: 14px; margin-bottom: 30px; display: block; }

        input {
            width: 100%;
            padding: 18px;
            margin-bottom: 20px;
            border: 2px solid #dfe6e9;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            background: white;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,184,148,0.15); }

        .btn-main {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0,184,148,0.3);
        }

        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,184,148,0.4); }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid #f1f2f6;
            transition: 0.3s;
        }

        .val-botol { font-size: 55px; font-weight: 800; color: var(--primary); margin: 0; line-height: 1; }
        .val-rupiah { font-size: 32px; font-weight: 800; color: var(--dark); margin: 0; }

        .btn-tarik {
            background: #dfe6e9;
            color: #b2bec3;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: not-allowed;
            margin-top: 10px;
            transition: 0.4s;
        }

        .btn-tarik.active {
            background: linear-gradient(to right, var(--gold), #f39c12);
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(253,203,110,0.3);
        }

        #modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(45, 52, 54, 0.85);
            backdrop-filter: blur(8px);
            display:none; align-items:center; justify-content:center; z-index: 1000;
        }

        .modal {
            background: white;
            padding: 35px;
            border-radius: 28px;
            width: 90%;
            max-width: 380px;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop { from { opacity: 0; scale: 0.8; } to { opacity: 1; scale: 1; } }

        .hidden { display: none; }
        
        .thank-you { 
            color: var(--primary); font-weight: 700; font-size: 14px; 
            margin-top: 25px; padding: 18px; background: #e8f8f5; 
            border-radius: 15px; line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="login-page" class="card">
        <div class="logo-container">♻️</div>
        <h2>RE-COIN</h2>
        <span class="subtitle">Digitalizing Waste for Better Future</span>
        <input type="number" id="phone-input" placeholder="Masukkan Nomor HP">
        <button class="btn-main" onclick="login()">MASUK SEKARANG</button>
    </div>

    <div id="dashboard-page" class="card hidden">
        <div style="background: var(--primary); color: white; padding: 6px 16px; border-radius: 20px; display: inline-block; font-size: 12px; font-weight: 600; margin-bottom: 25px;">
            USER ID: <span id="user-display"></span>
        </div>
        
        <div class="stat-card">
            <div style="font-size: 11px; font-weight: 700; color: #b2bec3; letter-spacing: 1.5px; margin-bottom: 5px;">TOTAL BOTOL</div>
            <div class="val-botol" id="count">0</div>
        </div>

        <div class="stat-card">
            <div style="font-size: 11px; font-weight: 700; color: #b2bec3; letter-spacing: 1.5px; margin-bottom: 5px;">SALDO TABUNGAN</div>
            <div class="val-rupiah" id="rupiah">Rp 0</div>
        </div>

        <button id="btn-tarik" class="btn-tarik" onclick="openModal()">TARIK SALDO</button>
        <div id="msg-limit" style="font-size: 11px; color: #ff7675; margin-top: 12px; font-weight: 600;">
            Minimal saldo Rp 5.000 untuk pencairan
        </div>
        
        <div id="closing-msg" class="hidden thank-you">
            🎉 Terimakasih anda sudah menjadi pahlawan lingkungan! 🌍
        </div>

        <button onclick="location.reload()" style="background:none; border:none; color:#b2bec3; margin-top:25px; cursor:pointer; font-size: 12px; font-weight: 600;">Logout Account</button>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 style="margin: 0 0 10px 0; font-size: 24px;">Pencairan</h3>
            <p style="margin-bottom: 20px;">Pilih metode pembayaran favoritmu</p>
            
            <select id="payment-method" style="width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #f1f2f6; margin-bottom: 15px; font-family: inherit; font-size: 14px;" onchange="toggleFields()">
                <option value="BANK">Transfer BANK</option>
                <option value="DANA">DANA</option>
                <option value="OVO">OVO</option>
                <option value="SHOPEEPAY">SHOPEE PAY</option>
            </select>
            
            <textarea id="payment-details" style="width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #f1f2f6; margin-bottom: 20px; font-family: inherit; box-sizing: border-box; resize: none;" rows="4" placeholder="Nama Bank: &#10;No Rekening: &#10;Atas Nama: "></textarea>
            
            <button class="btn-main" onclick="prosesCairkan()">KONFIRMASI PENARIKAN</button>
            <button onclick="closeModal()" style="background:none; border:none; width:100%; color:#b2bec3; margin-top:15px; cursor:pointer; font-weight: 600;">Nanti Saja</button>
        </div>
    </div>

<script>
    // Inisialisasi Firebase
    const firebaseConfig = { databaseURL: "https://re-coin-magelang-2026-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);

    let currentPhone = "";
    let currentBotol = 0;
    const HARGA_PER_BOTOL = 50;
    const MINIMAL_NOMINAL = 5000;

    function login() {
        const phone = document.getElementById('phone-input').value;
        if (!phone || phone.length < 10) {
            alert("Harap masukkan nomor HP yang valid!");
            return;
        }

        currentPhone = phone;
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('dashboard-page').classList.remove('hidden');
        document.getElementById('user-display').innerText = phone;

        const dbRef = firebase.database().ref('/user/' + phone);

        // FITUR AUTO-REGISTRATION
        dbRef.once('value', (snapshot) => {
            if (!snapshot.exists()) {
                console.log("Pahlawan baru terdaftar!");
                dbRef.set(0); 
            }
        });

        // Update Data Real-time
        dbRef.on('value', (snapshot) => {
            currentBotol = snapshot.val() || 0;
            const saldo = currentBotol * HARGA_PER_BOTOL;
            
            document.getElementById('count').innerText = currentBotol;
            document.getElementById('rupiah').innerText = "Rp " + saldo.toLocaleString('id-ID');
            
            const btn = document.getElementById('btn-tarik');
            const msg = document.getElementById('msg-limit');
            
            if (saldo >= MINIMAL_NOMINAL) {
                btn.classList.add('active');
                btn.disabled = false;
                msg.classList.add('hidden');
                btn.innerText = "TARIK SALDO SEKARANG";
            } else {
                btn.classList.remove('active');
                btn.disabled = true;
                msg.classList.remove('hidden');
                btn.innerText = "TARIK SALDO";
            }
        });
    }

    function openModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    function toggleFields() {
        const method = document.getElementById('payment-method').value;
        const details = document.getElementById('payment-details');
        if (method === "BANK") {
            details.placeholder = "Nama Bank: \nNo Rekening: \nAtas Nama: ";
        } else {
            details.placeholder = `Nomor HP ${method}: \nAtas Nama: `;
        }
    }

    function prosesCairkan() {
        const method = document.getElementById('payment-method').value;
        const details = document.getElementById('payment-details').value;
        if (!details) return alert("Mohon isi detail akun pembayaran!");

        const saldoRupiah = currentBotol * HARGA_PER_BOTOL;
        const waOperator = "6289524538835";
        const pesan = `*PERMINTAAN PENARIKAN RE-COIN*%0A------------------------------------%0A*ID User:* ${currentPhone}%0A*Metode:* ${method}%0A*Detail Rek:* ${details}%0A%0A*Total Botol:* ${currentBotol} Unit%0A*Total Rupiah:* Rp ${saldoRupiah.toLocaleString('id-ID')}%0A------------------------------------%0AMohon segera diproses admin!`;

        // Reset Data di Firebase
        firebase.database().ref('/user/' + currentPhone).set(0).then(() => {
            window.open(`https://wa.me/${waOperator}?text=${pesan}`, '_blank');
            closeModal();
            document.getElementById('closing-msg').classList.remove('hidden');
            document.getElementById('btn-tarik').style.display = 'none';
            document.getElementById('msg-limit').style.display = 'none';
        }).catch((err) => {
            alert("Terjadi kesalahan: " + err.message);
        });
    }
</script>
</body>
</html>
