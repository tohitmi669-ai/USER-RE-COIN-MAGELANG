<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RE-COIN | Digital Waste Solution</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00b894;
            --secondary: #00cec9;
            --dark: #2d3436;
            --gold: #fdcb6e;
            --glass: rgba(255, 255, 255, 0.92);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #00b894 0%, #0984e3 100%);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.4);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            background: white;
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 35px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        h2 { font-weight: 800; margin: 0; letter-spacing: -1px; font-size: 26px; }
        .subtitle { color: #636e72; font-size: 13px; margin-bottom: 25px; display: block; }

        input, select, textarea {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border: 2px solid #dfe6e9;
            border-radius: 15px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
        }

        .btn-main, .btn-tarik {
            padding: 16px;
            font-size: 16px;
            border-radius: 15px;
            font-weight: 700;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 8px 15px rgba(0,184,148,0.25);
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 12px;
            border: 1px solid #f1f2f6;
        }

        .val-botol { font-size: 48px; font-weight: 800; color: var(--primary); margin: 0; }
        .val-rupiah { font-size: 28px; font-weight: 800; color: var(--dark); margin: 0; }

        #modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display:none; align-items:flex-end;
            justify-content:center; z-index: 1000;
        }

        .modal {
            background: white;
            padding: 25px;
            border-radius: 25px 25px 0 0;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .hidden { display: none; }
        .thank-you { 
            color: var(--primary); font-weight: 700; font-size: 13px; 
            margin-top: 20px; padding: 15px; background: #e8f8f5; border-radius: 12px;
        }
    </style>
</head>
<body>

    <div id="login-page" class="card">
        <div class="logo-container">♻️</div>
        <h2>RE-COIN</h2>
        <span class="subtitle">Digitalizing Waste for Better Future</span>
        <input type="number" id="phone-input" placeholder="Masukkan Nomor HP">
        <button class="btn-main" onclick="login()">MASUK SEKARANG</button>
    </div>

    <div id="dashboard-page" class="card hidden">
        <div style="background: var(--primary); color: white; padding: 5px 12px; border-radius: 15px; display: inline-block; font-size: 11px; font-weight: 700; margin-bottom: 20px;">
            USER ID: <span id="user-display"></span>
        </div>
        
        <div class="stat-card">
            <div style="font-size: 10px; font-weight: 700; color: #b2bec3; letter-spacing: 1px;">TOTAL BOTOL</div>
            <div class="val-botol" id="count">0</div>
        </div>

        <div class="stat-card">
            <div style="font-size: 10px; font-weight: 700; color: #b2bec3; letter-spacing: 1px;">SALDO TABUNGAN</div>
            <div class="val-rupiah" id="rupiah">Rp 0</div>
        </div>

        <button id="btn-tarik" class="btn-tarik hidden" style="background:#dfe6e9; color:#b2bec3; cursor:not-allowed;" disabled>TARIK SALDO</button>
        <div id="msg-limit" style="font-size: 11px; color: #ff7675; margin-top: 10px; font-weight: 600;">
            Minimal saldo Rp 5.000 (100 botol)
        </div>
        
        <div id="closing-msg" class="hidden thank-you">
            🎉 Terimakasih anda sudah menjadi pahlawan lingkungan! 🌍
        </div>

        <button onclick="location.reload()" style="background:none; border:none; color:#b2bec3; margin-top:20px; cursor:pointer; font-size: 12px; font-weight: 600;">Logout</button>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 style="margin: 0 0 15px 0;">Metode Pencairan</h3>
            <select id="payment-method" onchange="toggleFields()">
                <option value="BANK">Transfer BANK</option>
                <option value="DANA">DANA</option>
                <option value="OVO">OVO</option>
                <option value="SHOPEEPAY">SHOPEE PAY</option>
            </select>
            <textarea id="payment-details" rows="3" placeholder="Nama Bank: &#10;No Rek: &#10;Atas Nama: "></textarea>
            <button class="btn-main" onclick="prosesCairkan()">KONFIRMASI PENARIKAN</button>
            <button onclick="closeModal()" style="background:none; border:none; width:100%; color:#b2bec3; margin-top:15px; font-weight:600;">Batal</button>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://re-coin-magelang-2026-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);

    let currentPhone = "";
    let currentBotol = 0;
    const HARGA_PER_BOTOL = 50;

    function login() {
        const phone = document.getElementById('phone-input').value;
        if (phone.length < 10) return alert("Nomor HP minimal 10 digit!");

        currentPhone = phone;
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('dashboard-page').classList.remove('hidden');
        document.getElementById('user-display').innerText = phone;

        const dbRef = firebase.database().ref('/user/' + phone);
        dbRef.once('value', (s) => { if(!s.exists()) dbRef.set(0); });

        dbRef.on('value', (snapshot) => {
            currentBotol = snapshot.val() || 0;
            const saldo = currentBotol * HARGA_PER_BOTOL;
            document.getElementById('count').innerText = currentBotol;
            document.getElementById('rupiah').innerText = "Rp " + saldo.toLocaleString('id-ID');
            
            const btn = document.getElementById('btn-tarik');
            const msg = document.getElementById('msg-limit');
            
            btn.classList.remove('hidden');
            if (saldo >= 5000) {
                btn.style.background = "linear-gradient(to right, var(--gold), #f39c12)";
                btn.style.color = "white";
                btn.style.cursor = "pointer";
                btn.disabled = false;
                btn.onclick = openModal;
                msg.classList.add('hidden');
            } else {
                btn.style.background = "#dfe6e9";
                btn.style.color = "#b2bec3";
                btn.disabled = true;
                msg.classList.remove('hidden');
            }
        });
    }

    function openModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    function toggleFields() {
        const method = document.getElementById('payment-method').value;
        document.getElementById('payment-details').placeholder = (method === "BANK") ? 
            "Nama Bank: \nNo Rek: \nAtas Nama: " : `No HP ${method}: \nAtas Nama: `;
    }

    function prosesCairkan() {
        // 1. CEK NOMOR HP DULU (KEAMANAN)
        const konfirmasiNomor = prompt("Demi keamanan, masukkan kembali nomor HP Anda yang terdaftar:");

        // Jika nomor salah, langsung berhenti (Return). Database TIDAK diupdate.
        if (konfirmasiNomor !== currentPhone) {
            alert("❌ Maaf, nomor handphone Anda tidak sesuai dengan nomor yang terdaftar. Silahkan login menggunakan nomor handphone yang terdaftar.");
            return; 
        }

        // 2. CEK DETAIL PEMBAYARAN
        const details = document.getElementById('payment-details').value;
        if (!details) {
            alert("Mohon isi detail pembayaran!");
            return;
        }

        // 3. JIKA SEMUA BENAR, BARU RESET SALDO & KIRIM WA
        const saldoRupiah = currentBotol * HARGA_PER_BOTOL;
        const waOperator = "6289524538835";
        const pesan = `*PENARIKAN RE-COIN TERVERIFIKASI*%0A------------------------------------%0A*ID User:* ${currentPhone}%0A*Metode:* ${document.getElementById('payment-method').value}%0A*Detail:* ${details}%0A%0A*Botol:* ${currentBotol}%0A*Total:* Rp ${saldoRupiah.toLocaleString('id-ID')}%0A------------------------------------%0APesan ini dikirim otomatis oleh sistem RE-COIN.`;

        // Reset saldo di Firebase hanya dilakukan SETELAH verifikasi nomor sukses
        firebase.database().ref('/user/' + currentPhone).set(0).then(() => {
            window.open(`https://wa.me/${waOperator}?text=${pesan}`, '_blank');
            closeModal();
            document.getElementById('closing-msg').classList.remove('hidden');
            document.getElementById('btn-tarik').classList.add('hidden');
            document.getElementById('msg-limit').classList.add('hidden');
        }).catch((err) => {
            alert("Terjadi kesalahan sistem: " + err.message);
        });
    }
</script>
</body>
</html>
