<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RE-COIN | Secure Digital Waste + Shop</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00b894; --secondary: #00cec9; --dark: #2d3436;
            --gold: #fdcb6e; --glass: rgba(255, 255, 255, 0.95);
            --danger: #ff7675; --warning: #fdcb6e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #00b894 0%, #0984e3 100%);
            margin: 0; display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .card {
            background: var(--glass); backdrop-filter: blur(15px); padding: 30px;
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.4);
        }
        .card-full {
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .logo-container {
            width: 150px; height: 150px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px; padding: 0;
        }
        .logo-container img {
            width: 100%; height: 100%; object-fit: contain; border-radius: 50%;
            display: block;
        }
        h2 { font-weight: 800; margin: 0; letter-spacing: -1px; font-size: 26px; }
        .subtitle { color: #636e72; font-size: 13px; margin-bottom: 25px; display: block; }
        input, select, textarea {
            width: 100%; padding: 16px; margin-bottom: 12px; border: 2px solid #dfe6e9;
            border-radius: 15px; font-size: 16px; outline: none; transition: 0.3s;
        }
        .btn-main, .btn-tarik, .btn-belanja {
            padding: 16px; font-size: 16px; border-radius: 15px; font-weight: 700;
            width: 100%; border: none; cursor: pointer; transition: 0.3s;
        }
        .btn-main { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; }
        .btn-tarik { background: linear-gradient(to right, var(--gold), #f39c12); color: white; }
        .btn-belanja { background: linear-gradient(to right, #6c5ce7, #a363d9); color: white; margin-top: 10px; }
        .stat-card { background: white; padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid #f1f2f6; }
        .val-botol { font-size: 48px; font-weight: 800; color: var(--primary); margin: 0; }
        .val-rupiah { font-size: 28px; font-weight: 800; color: var(--dark); margin: 0; }
        
        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .product-card {
            background: white;
            border-radius: 18px;
            padding: 15px;
            border: 1px solid #f1f2f6;
            transition: 0.3s;
        }
        .product-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .product-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 5px;
            color: var(--dark);
        }
        .product-price {
            font-weight: 800;
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .btn-beli {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 12px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-beli:active { transform: scale(0.95); }
        .btn-beli:disabled {
            background: #dfe6e9;
            cursor: not-allowed;
        }
        
        /* Cart */
        .cart-icon {
            position: relative;
            display: inline-block;
            margin-right: 10px;
            cursor: pointer;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .cart-panel {
            background: white;
            border-radius: 18px;
            padding: 15px;
            margin: 15px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #f1f2f6;
        }
        .cart-item:last-child { border-bottom: none; }
        .cart-item-title {
            font-weight: 600;
            font-size: 14px;
        }
        .cart-item-price {
            color: var(--primary);
            font-weight: 700;
        }
        .cart-total {
            font-weight: 800;
            font-size: 18px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid #f1f2f6;
        }
        .btn-checkout {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 700;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }
        .btn-checkout:disabled {
            background: #dfe6e9;
            cursor: not-allowed;
        }
        .btn-back {
            background: none;
            border: none;
            color: #b2bec3;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .cart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        #modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7);
            display:none; align-items:flex-end; justify-content:center; z-index: 1000;
        }
        .modal { background: white; padding: 25px; border-radius: 25px 25px 0 0; width: 100%; max-width: 500px; }
        .hidden { display: none; }
        .thank-you { color: var(--primary); font-weight: 700; font-size: 13px; margin-top: 20px; padding: 15px; background: #e8f8f5; border-radius: 12px; }
        
        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            font-weight: 600;
            z-index: 2000;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        
        /* Loading */
        .loading {
            grid-column: span 2;
            text-align: center;
            padding: 30px;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- Login Page -->
    <div id="login-page" class="card">
        <div class="logo-container">
            <img src="https://blogger.googleusercontent.com/img/a/AVvXsEjgjxOIVDPz5ZSArOCO_gzGumxmP87KZYIpCHU6R7M6qwMJA_XIiArURexEySHx4r9xZwj60feen8IB3PCcIZ7ydrnJUfkPXoJ4lvKHw_ZtiKtAyiBoUQXaFRYHV6mcf_7l9oS_PywQUvNMYzfv5F8MQ9yDUACJIrw-TLwktfOOEkHPIJ96OW3eiCORrCy8" 
                 alt="RE-COIN Logo" 
                 onerror="this.onerror=null; this.src='https://via.placeholder.com/150x150/00b894/ffffff?text=RE+COIN';">
        </div>
        <h2 id="auth-title">RE-COIN</h2>
        <span id="auth-subtitle" class="subtitle">Sampah Jadi Rupiah</span>
        
        <input type="number" id="phone-input" placeholder="Masukkan Nomor HP">
        <input type="password" id="pass-input" class="hidden" placeholder="Masukkan Password/PIN">
        
        <button id="btn-auth" class="btn-main" onclick="checkUser()">LANJUTKAN</button>
    </div>

    <!-- Dashboard Page -->
    <div id="dashboard-page" class="card hidden">
        <div style="background: var(--primary); color: white; padding: 5px 12px; border-radius: 15px; display: inline-block; font-size: 11px; font-weight: 700; margin-bottom: 20px;">
            USER ID: <span id="user-display"></span>
        </div>
        <div class="stat-card">
            <div style="font-size: 10px; font-weight: 700; color: #b2bec3;">TOTAL BOTOL</div>
            <div class="val-botol" id="count">0</div>
        </div>
        <div class="stat-card">
            <div style="font-size: 10px; font-weight: 700; color: #b2bec3;">SALDO TABUNGAN</div>
            <div class="val-rupiah" id="rupiah">Rp 0</div>
        </div>
        <button id="btn-tarik" class="btn-tarik hidden" disabled>TARIK SALDO</button>
        <button id="btn-belanja" class="btn-belanja" onclick="showShop()">🛒 BELANJA SEKARANG</button>
        <div id="msg-limit" style="font-size: 11px; color: #ff7675; margin-top: 10px; font-weight: 600;">Minimal saldo Rp 5.000</div>
        <div id="closing-msg" class="hidden thank-you">🎉 Terimakasih Pahlawan Lingkungan! Saldo sedang diproses.</div>
        <button onclick="location.reload()" style="background:none; border:none; color:#b2bec3; margin-top:20px; cursor:pointer; font-size: 12px;">Logout</button>
    </div>

    <!-- Shop Page -->
    <div id="shop-page" class="card card-full hidden">
        <button class="btn-back" onclick="hideShop()">← Kembali ke Dashboard</button>
        
        <div class="cart-header">
            <h3 style="margin:0;">🛍️ Produk</h3>
            <div class="cart-icon" onclick="toggleCart()">
                🛒
                <span class="cart-count" id="cart-count">0</span>
            </div>
        </div>

        <!-- Cart Panel (hidden by default) -->
        <div id="cart-panel" class="cart-panel hidden">
            <h4 style="margin:0 0 10px 0;">Keranjang Belanja</h4>
            <div id="cart-items"></div>
            <div class="cart-total" id="cart-total">Total: Rp 0</div>
            <button class="btn-checkout" onclick="checkout()" id="btn-checkout" disabled>CHECKOUT</button>
        </div>

        <!-- Product Grid -->
        <div class="product-grid" id="product-grid">
            <div class="loading">Tunggu Sedang Memuat produk...</div>
        </div>
    </div>

    <!-- Withdrawal Modal -->
    <div id="modal-overlay">
        <div class="modal">
            <h3 style="margin:0 0 15px 0;">Metode Pencairan</h3>
            <select id="payment-method" onchange="toggleFields()">
                <option value="BANK">Transfer BANK</option>
                <option value="DANA">DANA</option>
                <option value="OVO">OVO</option>
            </select>
            <textarea id="payment-details" rows="3" placeholder="Detail Rekening..."></textarea>
            <button class="btn-main" onclick="prosesCairkan()">KONFIRMASI PENARIKAN</button>
            <button onclick="closeModal()" style="background:none; border:none; width:100%; color:#b2bec3; margin-top:15px;">Batal</button>
        </div>
    </div>

<script>
    // Firebase Configuration
    const firebaseConfig = { 
        databaseURL: "https://re-coin-magelang-2026-default-rtdb.asia-southeast1.firebasedatabase.app" 
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Global Variables
    let currentPhone = "";
    let currentBotol = 0;
    let isRegistering = false;
    const HARGA_PER_BOTOL = 50;
    
    // Shopping Cart
    let cart = [];
    let products = []; // Akan diisi dari database

    // ============== AUTHENTICATION FUNCTIONS ==============
    function checkUser() {
        const phone = document.getElementById('phone-input').value;
        if (phone.length < 10) return alert("Nomor HP minimal 10 digit!");
        
        currentPhone = phone;
        const userRef = db.ref('/accounts/' + phone);

        userRef.once('value', (snapshot) => {
            if (snapshot.exists()) {
                showPasswordInput("Login", "Masukkan Password Akun Anda");
                isRegistering = false;
            } else {
                showPasswordInput("Daftar", "Buat Password Baru Anda");
                isRegistering = true;
            }
        });
    }

    function showPasswordInput(btnText, subtitle) {
        document.getElementById('phone-input').readOnly = true;
        document.getElementById('pass-input').classList.remove('hidden');
        document.getElementById('auth-title').innerText = btnText;
        document.getElementById('auth-subtitle').innerText = subtitle;
        document.getElementById('btn-auth').onclick = authenticate;
    }

    function authenticate() {
        const pass = document.getElementById('pass-input').value;
        if (pass.length < 4) return alert("Password minimal 4 karakter!");

        const userRef = db.ref('/accounts/' + currentPhone);

        if (isRegistering) {
            userRef.set({ password: pass, botol: 0 }).then(() => loginSuccess());
        } else {
            userRef.once('value', (snapshot) => {
                if (snapshot.val().password === pass) {
                    loginSuccess();
                } else {
                    alert("Password Salah!");
                }
            });
        }
    }

    function loginSuccess() {
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('dashboard-page').classList.remove('hidden');
        document.getElementById('user-display').innerText = currentPhone;

        // Listen for botol changes
        db.ref('/accounts/' + currentPhone + '/botol').on('value', (snap) => {
            currentBotol = snap.val() || 0;
            updateUI();
        });
        
        // Load products from database
        loadProductsFromDB();
        
        // Show welcome notification
        showNotification('Selamat datang di RE-COIN!');
    }

    function updateUI() {
        const saldo = currentBotol * HARGA_PER_BOTOL;
        document.getElementById('count').innerText = currentBotol;
        document.getElementById('rupiah').innerText = "Rp " + saldo.toLocaleString('id-ID');
        
        const btn = document.getElementById('btn-tarik');
        const msg = document.getElementById('msg-limit');
        btn.classList.remove('hidden');

        if (saldo >= 5000) {
            btn.style.background = "linear-gradient(to right, var(--gold), #f39c12)";
            btn.style.color = "white"; 
            btn.disabled = false; 
            btn.onclick = openModal;
            msg.classList.add('hidden');
        } else {
            btn.style.background = "#dfe6e9"; 
            btn.disabled = true;
            msg.classList.remove('hidden');
        }
        
        // Update cart if open
        updateCartDisplay();
    }

    // ============== PRODUCT FUNCTIONS ==============
    function loadProductsFromDB() {
        const grid = document.getElementById('product-grid');
        if (!grid) return;
        
        grid.innerHTML = '<div class="loading">Memuat produk...</div>';
        
        db.ref('/products').once('value').then((snap) => {
            const productsData = snap.val() || {};
            products = []; // Reset products array
            
            for (let id in productsData) {
                products.push({
                    id: id,
                    ...productsData[id]
                });
            }
            
            displayProducts(products);
            
            // Listen for real-time updates
            listenForProductUpdates();
            
        }).catch(error => {
            console.error('Error loading products:', error);
            grid.innerHTML = '<div class="loading" style="color: red;">Gagal memuat produk</div>';
        });
    }
    
    function listenForProductUpdates() {
        // Listen for new products
        db.ref('/products').on('child_added', (snap) => {
            const newProduct = {
                id: snap.key,
                ...snap.val()
            };
            
            // Check if product already exists
            const exists = products.some(p => p.id === newProduct.id);
            if (!exists) {
                products.push(newProduct);
                displayProducts(products);
                showNotification('Produk baru tersedia!', 'info');
            }
        });
        
        // Listen for product changes
        db.ref('/products').on('child_changed', (snap) => {
            const updatedProduct = {
                id: snap.key,
                ...snap.val()
            };
            
            const index = products.findIndex(p => p.id === updatedProduct.id);
            if (index !== -1) {
                products[index] = updatedProduct;
                displayProducts(products);
            }
        });
        
        // Listen for product deletions
        db.ref('/products').on('child_removed', (snap) => {
            products = products.filter(p => p.id !== snap.key);
            displayProducts(products);
            showNotification('Produk telah dihapus', 'info');
        });
    }

    function displayProducts(productsToShow) {
        const grid = document.getElementById('product-grid');
        if (!grid) return;
        
        if (productsToShow.length === 0) {
            grid.innerHTML = '<div class="loading">Belum ada produk tersedia</div>';
            return;
        }
        
        let html = '';
        productsToShow.forEach(product => {
            // Cek stok
            const stock = product.stock || 0;
            const isOutOfStock = stock <= 0;
            
            html += `
                <div class="product-card">
                    <img src="${product.image || 'https://via.placeholder.com/200x200/00b894/ffffff?text=Produk'}" 
                         alt="${product.name}"
                         onerror="this.src='https://via.placeholder.com/200x200/00b894/ffffff?text=Produk'">
                    <div class="product-name">${product.name || 'Produk'}</div>
                    <div class="product-price">Rp ${(product.price || 0).toLocaleString('id-ID')}</div>
                    <button class="btn-beli" 
                            onclick="addToCart('${product.id}')" 
                            ${isOutOfStock ? 'disabled' : ''}
                            style="${isOutOfStock ? 'background: #dfe6e9; cursor: not-allowed;' : ''}">
                        ${isOutOfStock ? 'Stok Habis' : '🛒 Beli'}
                    </button>
                    <div style="font-size:10px; color:#b2bec3; margin-top:5px;">
                        Stok: ${stock}
                    </div>
                </div>
            `;
        });
        
        grid.innerHTML = html;
    }

    // ============== CART FUNCTIONS ==============
    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) {
            showNotification('Produk tidak ditemukan');
            return;
        }
        
        const saldo = currentBotol * HARGA_PER_BOTOL;
        if (saldo < product.price) {
            showNotification('Saldo tidak cukup!');
            return;
        }
        
        if (product.stock <= 0) {
            showNotification('Stok habis!');
            return;
        }
        
        const existingItem = cart.find(item => item.id === productId);
        if (existingItem) {
            if (existingItem.quantity >= product.stock) {
                showNotification('Stok tidak mencukupi!');
                return;
            }
            existingItem.quantity++;
        } else {
            cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                quantity: 1
            });
        }
        
        updateCartDisplay();
        showNotification(`${product.name} ditambahkan ke keranjang`);
    }

    function removeFromCart(productId) {
        const index = cart.findIndex(item => item.id === productId);
        if (index !== -1) {
            if (cart[index].quantity > 1) {
                cart[index].quantity--;
            } else {
                cart.splice(index, 1);
            }
        }
        updateCartDisplay();
    }

    function updateCartDisplay() {
        // Update cart count
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('cart-count').textContent = totalItems;
        
        // Update cart items list
        const cartItemsDiv = document.getElementById('cart-items');
        const cartTotalSpan = document.getElementById('cart-total');
        const checkoutBtn = document.getElementById('btn-checkout');
        
        if (cart.length === 0) {
            cartItemsDiv.innerHTML = '<p style="color:#b2bec3; text-align:center;">Keranjang kosong</p>';
            cartTotalSpan.innerHTML = 'Total: Rp 0';
            checkoutBtn.disabled = true;
            return;
        }
        
        let cartHtml = '';
        let total = 0;
        
        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            cartHtml += `
                <div class="cart-item">
                    <div>
                        <div class="cart-item-title">${item.name}</div>
                        <div style="font-size:12px;">${item.quantity} x Rp ${item.price.toLocaleString('id-ID')}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span class="cart-item-price">Rp ${itemTotal.toLocaleString('id-ID')}</span>
                        <button onclick="removeFromCart('${item.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                    </div>
                </div>
            `;
        });
        
        cartItemsDiv.innerHTML = cartHtml;
        cartTotalSpan.innerHTML = `Total: Rp ${total.toLocaleString('id-ID')}`;
        
        // Check if saldo cukup
        const saldo = currentBotol * HARGA_PER_BOTOL;
        checkoutBtn.disabled = total > saldo;
    }

    function toggleCart() {
        const cartPanel = document.getElementById('cart-panel');
        cartPanel.classList.toggle('hidden');
    }

    function checkout() {
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const saldo = currentBotol * HARGA_PER_BOTOL;
        
        if (total > saldo) {
            showNotification('Saldo tidak cukup!');
            return;
        }
        
        if (cart.length === 0) {
            showNotification('Keranjang belanja kosong');
            return;
        }
        
        // Cek stok sebelum checkout
        let stockAvailable = true;
        for (let item of cart) {
            const product = products.find(p => p.id === item.id);
            if (!product || product.stock < item.quantity) {
                stockAvailable = false;
                showNotification(`Stok ${item.name} tidak cukup! Tersisa ${product ? product.stock : 0}`);
                break;
            }
        }
        
        if (!stockAvailable) return;
        
        // Kurangi botol sesuai total belanja
        const botolDipakai = Math.ceil(total / HARGA_PER_BOTOL);
        const newBotol = currentBotol - botolDipakai;
        
        // Update stok produk di database
        const updates = {};
        cart.forEach(item => {
            const product = products.find(p => p.id === item.id);
            if (product) {
                const newStock = product.stock - item.quantity;
                updates[`/products/${item.id}/stock`] = newStock;
            }
        });
        
        // Update saldo user
        updates[`/accounts/${currentPhone}/botol`] = newBotol;
        
        // Catat transaksi
        const transactionKey = db.ref(`/transactions/${currentPhone}`).push().key;
        updates[`/transactions/${currentPhone}/${transactionKey}`] = {
            type: 'PEMBELIAN',
            items: cart.map(item => ({
                id: item.id,
                name: item.name,
                price: item.price,
                quantity: item.quantity
            })),
            total: total,
            timestamp: Date.now()
        };
        
        // Execute all updates
        db.ref().update(updates).then(() => {
            // Update local products array
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    product.stock -= item.quantity;
                }
            });
            
            // Reset cart
            cart = [];
            updateCartDisplay();
            document.getElementById('cart-panel').classList.add('hidden');
            showNotification('Pembelian berhasil! Terima kasih telah berbelanja.');
            
            // Refresh produk display
            displayProducts(products);
            
        }).catch(error => {
            console.error('Checkout error:', error);
            showNotification('Gagal melakukan checkout. Silakan coba lagi.', 'error');
        });
    }

    // ============== SHOP NAVIGATION ==============
    function showShop() {
        document.getElementById('dashboard-page').classList.add('hidden');
        document.getElementById('shop-page').classList.remove('hidden');
        // Refresh products when showing shop
        loadProductsFromDB();
    }

    function hideShop() {
        document.getElementById('shop-page').classList.add('hidden');
        document.getElementById('dashboard-page').classList.remove('hidden');
    }

    // ============== WITHDRAWAL FUNCTIONS ==============
    function openModal() { 
        document.getElementById('modal-overlay').style.display = 'flex'; 
    }
    
    function closeModal() { 
        document.getElementById('modal-overlay').style.display = 'none'; 
    }

    function toggleFields() {
        const m = document.getElementById('payment-method').value;
        document.getElementById('payment-details').placeholder = (m === "BANK") ? "Nama Bank, No Rek, Atas Nama" : "No HP " + m + ", Atas Nama";
    }

    function prosesCairkan() {
        const method = document.getElementById('payment-method').value;
        const details = document.getElementById('payment-details').value;
        
        let methodLabel = '';
        switch(method) {
            case 'BANK': methodLabel = 'Transfer BANK'; break;
            case 'DANA': methodLabel = 'DANA'; break;
            case 'OVO': methodLabel = 'OVO'; break;
            default: methodLabel = method;
        }
        
        if (!details) return alert("Isi detail pembayaran!");

        const saldoRupiah = currentBotol * HARGA_PER_BOTOL;
        const pesan = `*PENARIKAN RE-COIN*%0AID: ${currentPhone}%0ATotal: Rp ${saldoRupiah.toLocaleString('id-ID')}%0AMetode: ${methodLabel}%0ADetail: ${details}`;

        db.ref('/accounts/' + currentPhone + '/botol').set(0).then(() => {
            window.open(`https://wa.me/6289524538835?text=${pesan}`, '_blank');
            closeModal();
            document.getElementById('closing-msg').classList.remove('hidden');
            document.getElementById('btn-tarik').classList.add('hidden');
            showNotification('Permintaan penarikan sedang diproses');
        });
    }

    // ============== NOTIFICATION FUNCTION ==============
    function showNotification(message, type = 'success') {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.textContent = message;
        notif.style.background = type === 'success' ? 'white' : '#ff7675';
        notif.style.color = type === 'success' ? '#333' : 'white';
        document.body.appendChild(notif);
        
        setTimeout(() => {
            notif.remove();
        }, 3000);
    }

    // ============== INITIALIZATION ==============
    window.onload = function() {
        // Set default placeholder for products
        console.log('RE-COIN User App Ready');
    };
</script>
</body>
</html>
