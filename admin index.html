<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard RE-COIN</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 1em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }
        
        .stat-card .value.small {
            font-size: 1.8em;
        }
        
        .stat-card.primary { border-top: 5px solid #00b894; }
        .stat-card.success { border-top: 5px solid #fdcb6e; }
        .stat-card.info { border-top: 5px solid #0984e3; }
        .stat-card.warning { border-top: 5px solid #e17055; }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f1f1;
        }
        
        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-section input, .filter-section select {
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 14px;
            flex: 1;
            min-width: 200px;
        }
        
        .filter-section button {
            padding: 12px 25px;
            background: #00b894;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .filter-section button:hover {
            background: #00a187;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th {
            background: #00b894;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f1f1;
            color: #333;
        }
        
        tr:hover {
            background: #f9f9f9;
        }
        
        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .badge.bank { background: #e3f2fd; color: #1976d2; }
        .badge.dana { background: #e8f5e8; color: #00b894; }
        .badge.ovo { background: #f3e5f5; color: #8e24aa; }
        
        .rupiah {
            font-weight: bold;
            color: #00b894;
        }
        
        .refresh-btn {
            background: #0984e3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            float: right;
        }
        
        .refresh-btn:hover {
            background: #0769b3;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .last-update {
            color: #999;
            font-size: 12px;
            margin-top: 10px;
            text-align: right;
        }
        
        @media (max-width: 768px) {
            table {
                display: block;
                overflow-x: auto;
            }
            
            .stats-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RE-COIN Admin Dashboard</h1>
        
        <div class="stats-container">
            <div class="stat-card primary">
                <h3>Total Pengguna</h3>
                <div class="value" id="totalUsers">0</div>
            </div>
            
            <div class="stat-card success">
                <h3>Total Botol</h3>
                <div class="value" id="totalBotol">0</div>
            </div>
            
            <div class="stat-card info">
                <h3>Total Saldo</h3>
                <div class="value small" id="totalSaldo">Rp 0</div>
            </div>
            
            <div class="stat-card warning">
                <h3>Rata-rata Saldo</h3>
                <div class="value small" id="avgSaldo">Rp 0</div>
            </div>
        </div>
        
        <div class="card">
            <h2>Daftar Pengguna & Riwayat Penarikan</h2>
            
            <div class="filter-section">
                <input type="text" id="searchInput" placeholder="Cari berdasarkan nomor HP...">
                <select id="filterMethod">
                    <option value="">Semua Metode</option>
                    <option value="BANK">Transfer BANK</option>
                    <option value="DANA">DANA</option>
                    <option value="OVO">OVO</option>
                </select>
                <button onclick="applyFilters()">Terapkan Filter</button>
                <button class="refresh-btn" onclick="loadAdminData()">⟳ Refresh Data</button>
            </div>
            
            <div class="table-responsive">
                <table id="userTable">
                    <thead>
                        <tr>
                            <th>No. HP</th>
                            <th>Jumlah Botol</th>
                            <th>Saldo</th>
                            <th>Riwayat Penarikan</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="userList">
                        <tr>
                            <td colspan="5" class="loading">Memuat data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="last-update" id="lastUpdate"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://re-coin-magelang-2026-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const HARGA_PER_BOTOL = 50;
        let allUsers = [];
        let withdrawalHistory = [];
        
        function formatRupiah(angka) {
            return 'Rp ' + angka.toLocaleString('id-ID');
        }
        
        function loadAdminData() {
            document.getElementById('userList').innerHTML = '<tr><td colspan="5" class="loading">Memuat data...</td></tr>';
            
            // Ambil data users
            const usersRef = db.ref('/accounts');
            // Ambil data penarikan (jika ada node terpisah)
            const withdrawRef = db.ref('/withdrawals');
            
            Promise.all([
                usersRef.once('value'),
                withdrawRef.once('value').catch(() => ({ val: () => ({}) })) // Jika node belum ada
            ]).then(([usersSnap, withdrawSnap]) => {
                const users = usersSnap.val() || {};
                const withdrawals = withdrawSnap.val() || {};
                
                let totalUsers = 0;
                let totalBotol = 0;
                let totalSaldo = 0;
                let usersArray = [];
                
                // Proses data users
                for (let userId in users) {
                    totalUsers++;
                    const botol = users[userId].botol || 0;
                    const saldo = botol * HARGA_PER_BOTOL;
                    
                    totalBotol += botol;
                    totalSaldo += saldo;
                    
                    // Cari riwayat penarikan untuk user ini
                    let userWithdrawals = [];
                    for (let wId in withdrawals) {
                        if (withdrawals[wId].userId === userId) {
                            userWithdrawals.push(withdrawals[wId]);
                        }
                    }
                    
                    usersArray.push({
                        id: userId,
                        botol: botol,
                        saldo: saldo,
                        password: users[userId].password || '***',
                        withdrawals: userWithdrawals
                    });
                }
                
                allUsers = usersArray;
                const avgSaldo = totalUsers > 0 ? totalSaldo / totalUsers : 0;
                
                // Update statistik
                document.getElementById('totalUsers').innerText = totalUsers;
                document.getElementById('totalBotol').innerText = totalBotol.toLocaleString('id-ID');
                document.getElementById('totalSaldo').innerHTML = formatRupiah(totalSaldo);
                document.getElementById('avgSaldo').innerHTML = formatRupiah(avgSaldo);
                
                // Tampilkan tabel
                displayUsers(usersArray);
                
                // Update waktu
                document.getElementById('lastUpdate').innerHTML = 'Terakhir diperbarui: ' + new Date().toLocaleString('id-ID');
            }).catch(error => {
                console.error('Error loading data:', error);
                document.getElementById('userList').innerHTML = '<tr><td colspan="5" class="loading" style="color: red;">Gagal memuat data. Coba refresh.</td></tr>';
            });
        }
        
        function displayUsers(users) {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterMethod = document.getElementById('filterMethod').value;
            
            let filteredUsers = users;
            
            // Filter berdasarkan pencarian
            if (searchTerm) {
                filteredUsers = filteredUsers.filter(user => 
                    user.id.toLowerCase().includes(searchTerm)
                );
            }
            
            let html = '';
            
            if (filteredUsers.length === 0) {
                html = '<tr><td colspan="5" class="loading">Tidak ada data yang cocok</td></tr>';
            } else {
                filteredUsers.forEach(user => {
                    // Buat riwayat penarikan HTML
                    let withdrawHtml = '';
                    if (user.withdrawals && user.withdrawals.length > 0) {
                        // Ambil 3 penarikan terakhir
                        const recentWithdrawals = user.withdrawals.slice(-3).reverse();
                        withdrawHtml = recentWithdrawals.map(w => {
                            const methodClass = w.method ? w.method.toLowerCase() : 'bank';
                            return `<div class="badge ${methodClass}" style="margin: 2px; display: inline-block;">
                                ${w.method || 'BANK'}: ${formatRupiah(w.amount || 0)}
                            </div>`;
                        }).join('');
                    } else {
                        withdrawHtml = '<span style="color: #999;">Belum ada penarikan</span>';
                    }
                    
                    // Status berdasarkan saldo
                    const statusClass = user.saldo >= 5000 ? 'badge' : '';
                    const statusColor = user.saldo >= 5000 ? '#00b894' : '#ff7675';
                    const statusText = user.saldo >= 5000 ? 'Bisa Cair' : 'Minim Saldo';
                    
                    html += `<tr>
                        <td><strong>${user.id}</strong></td>
                        <td>${user.botol.toLocaleString('id-ID')} botol</td>
                        <td class="rupiah">${formatRupiah(user.saldo)}</td>
                        <td>${withdrawHtml}</td>
                        <td><span style="background: ${statusColor}; color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold;">${statusText}</span></td>
                    </tr>`;
                });
            }
            
            document.getElementById('userList').innerHTML = html;
        }
        
        function applyFilters() {
            displayUsers(allUsers);
        }
        
        // Simulasi data penarikan (karena di struktur asli mungkin belum ada node withdrawals)
        function initializeWithdrawalsData() {
            // Cek apakah node withdrawals sudah ada, jika belum buat contoh
            const withdrawRef = db.ref('/withdrawals');
            withdrawRef.once('value').then(snap => {
                if (!snap.exists()) {
                    // Buat data contoh (opsional)
                    console.log('Node withdrawals belum ada. Buat data contoh?');
                }
            });
        }
        
        // Load data saat halaman dibuka
        window.onload = function() {
            loadAdminData();
            initializeWithdrawalsData();
            
            // Auto refresh setiap 60 detik
            setInterval(loadAdminData, 60000);
        };
    </script>
</body>
</html>
